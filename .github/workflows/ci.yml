name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - "public/**"
      - ".github/pull_request_template.md"
      - ".vibe/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "wiki/**"
      - "public/**"
      - ".github/pull_request_template.md"
      - ".vibe/**"
      - "LICENSE"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev
      - run: uv run ruff check vital/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vital
          POSTGRES_PASSWORD: vital
          POSTGRES_DB: vital
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vital"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: vital
      POSTGRES_PASSWORD: vital
      POSTGRES_DB: vital
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev
      - run: uv run pytest -v
